name: Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: check-${{ github.workflow }}-${{ github.ref }}

jobs:
  check:
    name: Lint, typecheck, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: waypoint-guest-app

      - name: Checkout Waypoint platform
        if: ${{ secrets.WAYPOINT_PLATFORM_CHECKOUT_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: withharbor/hosting
          path: hosting-platform
          token: ${{ secrets.WAYPOINT_PLATFORM_CHECKOUT_TOKEN }}

      - name: Skip checks without platform checkout token
        if: ${{ secrets.WAYPOINT_PLATFORM_CHECKOUT_TOKEN == '' }}
        run: |
          echo "::notice::Skipping guest checks because WAYPOINT_PLATFORM_CHECKOUT_TOKEN is not configured and Waypoint packages are private."

      - name: Setup Bun
        if: ${{ secrets.WAYPOINT_PLATFORM_CHECKOUT_TOKEN != '' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        if: ${{ secrets.WAYPOINT_PLATFORM_CHECKOUT_TOKEN != '' }}
        working-directory: waypoint-guest-app
        run: bun install --frozen-lockfile

      - name: Run checks
        if: ${{ secrets.WAYPOINT_PLATFORM_CHECKOUT_TOKEN != '' }}
        working-directory: waypoint-guest-app
        run: bun run check
